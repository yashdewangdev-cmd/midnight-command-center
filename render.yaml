services:
  # ─── Combined Full-Stack Service ───
  - type: web
    name: midnight-command-center
    env: docker
    region: ohio # Change to your preferred region (e.g., frankfurt, oregon, etc.)
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true # Render will automatically deploy when changes are pushed to GitHub
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
